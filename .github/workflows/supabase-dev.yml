name: Deploy Supabase Dev

on:
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: "Apply migrations to SideQuest-Dev. Leave false for dry-run only."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: supabase-dev
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate SideQuest-Dev
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF_DEV }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify SideQuest target
        run: scripts/verify-supabase-target.sh

      - name: Link SideQuest-Dev project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}"

      - name: Dry run migrations
        run: supabase db push --dry-run --password "${SUPABASE_DB_PASSWORD}"

      - name: Apply migrations
        if: ${{ inputs.apply_migrations == true }}
        run: supabase db push --password "${SUPABASE_DB_PASSWORD}"
